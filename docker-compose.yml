version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: finvibe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-finvibe}
      POSTGRES_USER: ${DB_USER:-finvibe_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-finvibe_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-finvibe_user} -d ${DB_NAME:-finvibe}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finvibe-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finvibe-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DB_TYPE: ${DB_TYPE:-postgres}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-finvibe}
      DB_USER: ${DB_USER:-finvibe_user}
      DB_PASSWORD: ${DB_PASSWORD:-finvibe_password}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - finvibe-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:${BACKEND_PORT:-3000}/api
    container_name: finvibe-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - finvibe-network

volumes:
  postgres_data:
    driver: local

networks:
  finvibe-network:
    driver: bridge
