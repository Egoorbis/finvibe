apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: finvibe
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: finvibe
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
  # Headless service — lets the StatefulSet manage DNS for each pod
  clusterIP: None
