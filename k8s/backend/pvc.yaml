apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-uploads-pvc
  namespace: finvibe
  labels:
    app: backend
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: finvibe
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # Change to your cluster's StorageClass if different
  storageClassName: local-path
