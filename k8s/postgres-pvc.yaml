apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: finvibe
  labels:
    app: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 32Gi
  # Storage class depends on your environment:
  # - Azure AKS: azurefile, managed-csi, managed-premium
  # - Proxmox K3s: local-path, nfs-client, ceph-rbd, longhorn
  # - GKE: standard, standard-rwo, premium-rwo
  # - EKS: gp3, gp2, io2
  storageClassName: default  # Change based on your cluster
