apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finvibe-ingress
  namespace: finvibe
  labels:
    app.kubernetes.io/part-of: finvibe
  annotations:
    # Requires nginx ingress controller — see README for install instructions
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # Uncomment to enable cert-manager TLS (requires cert-manager installed)
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  # Uncomment and set your domain to enable TLS
  # tls:
  #   - hosts:
  #       - finvibe.example.com
  #     secretName: finvibe-tls
  rules:
    # Replace with your actual domain or IP
    - host: finvibe.example.com
      http:
        paths:
          # All traffic goes to the frontend; the frontend nginx proxy handles /api/ internally
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
