name: Publish Images to GHCR

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (defaults to short SHA)"
        required: false

permissions:
  contents: read
  packages: write # Required to push to GHCR

jobs:
  build-and-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [backend, frontend]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for ${{ matrix.service }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          # GHCR requires lowercase — toLower handles mixed-case org/user names
          images: ghcr.io/${{ github.repository_owner }}/finvibe-${{ matrix.service }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest
          tags: |
            # Branch push → use branch name
            type=ref,event=branch
            # Tag push → use semver tag (e.g. v1.2.3 → 1.2.3 and latest)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Always tag with short SHA for traceability
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false # Avoids multi-arch manifest issues on simple setups
