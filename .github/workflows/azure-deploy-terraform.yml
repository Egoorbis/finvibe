name: Deploy to Azure with Terraform

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  TERRAFORM_VERSION: "1.11"
  WORKING_DIR: ./infra
  ACR_NAME: metrreg
  ACR_LOGIN_SERVER: metrreg-g3f3hxgzfbfkfxhk.azurecr.io
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  BACKEND_RESOURCE_GROUP: ${{ secrets.BACKEND_RESOURCE_GROUP }}
  BACKEND_STORAGE_ACCOUNT: ${{ secrets.BACKEND_STORAGE_ACCOUNT }}
  BACKEND_CONTAINER: ${{ secrets.BACKEND_CONTAINER_NAME }}
  BACKEND_KEY: ${{ secrets.BACKEND_KEY }}

jobs:
  build-and-push-images:
    name: Build and Push Container Images
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push backend image
        run: |
          cd backend
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/finvibe-backend:${{ github.sha }} \
                       -t ${{ env.ACR_LOGIN_SERVER }}/finvibe-backend:latest .
          docker push ${{ env.ACR_LOGIN_SERVER }}/finvibe-backend:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/finvibe-backend:latest

      - name: Build and push frontend image
        run: |
          cd frontend
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/finvibe-frontend:${{ github.sha }} \
                       -t ${{ env.ACR_LOGIN_SERVER }}/finvibe-frontend:latest .
          docker push ${{ env.ACR_LOGIN_SERVER }}/finvibe-frontend:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/finvibe-frontend:latest

  terraform-plan:
    name: Terraform Plan
    needs: [build-and-push-images]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      tfplanExitCode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
          -backend-config="resource_group_name=$BACKEND_RESOURCE_GROUP" \
          -backend-config="storage_account_name=$BACKEND_STORAGE_ACCOUNT" \
          -backend-config="container_name=$BACKEND_CONTAINER" \
          -backend-config="key=$BACKEND_KEY" \

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform plan -detailed-exitcode -no-color -out=tfplan
          exitcode=$?
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
          if [ $exitcode -eq 1 ]; then
            echo "Terraform plan failed"
            exit 1
          else
            exit 0
          fi

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}/tfplan

  terraform-apply:
    name: Terraform Apply
    needs: [terraform-plan]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      backend_app_name: ${{ steps.outputs.outputs.backend_app_name }}
      frontend_app_name: ${{ steps.outputs.outputs.frontend_app_name }}
      resource_group_name: ${{ steps.outputs.outputs.resource_group_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init  \
          -backend-config="resource_group_name=$BACKEND_RESOURCE_GROUP" \
          -backend-config="storage_account_name=$BACKEND_STORAGE_ACCOUNT" \
          -backend-config="container_name=$BACKEND_CONTAINER" \
          -backend-config="key=$BACKEND_KEY" \

      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        id: outputs
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "backend_app_name=$(terraform output -raw backend_app_name)" >> $GITHUB_OUTPUT
          echo "frontend_app_name=$(terraform output -raw frontend_app_name)" >> $GITHUB_OUTPUT
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> $GITHUB_OUTPUT

  update-containers:
    name: Update Containers and Config
    needs: [terraform-apply]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update backend Container App
        run: |
          az containerapp update \
            --name ${{ needs.terraform-apply.outputs.backend_app_name }} \
            --resource-group ${{ needs.terraform-apply.outputs.resource_group_name }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/finvibe-backend:${{ github.sha }}

      - name: Get backend URL
        id: backend-url
        run: |
          BACKEND_URL=$(az containerapp show \
            --name ${{ needs.terraform-apply.outputs.backend_app_name }} \
            --resource-group ${{ needs.terraform-apply.outputs.resource_group_name }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "url=https://$BACKEND_URL" >> $GITHUB_OUTPUT

      - name: Update frontend Container App with backend URL
        run: |
          az containerapp update \
            --name ${{ needs.terraform-apply.outputs.frontend_app_name }} \
            --resource-group ${{ needs.terraform-apply.outputs.resource_group_name }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/finvibe-frontend:${{ github.sha }} \
            --set-env-vars VITE_API_URL=${{ steps.backend-url.outputs.url }}/api

      - name: Run database migrations
        run: |
          az containerapp exec \
            --name ${{ needs.terraform-apply.outputs.backend_app_name }} \
            --resource-group ${{ needs.terraform-apply.outputs.resource_group_name }} \
            --command "/bin/sh" \
            --args "-c 'npm run db:migrate'" || echo "Migration skipped or already applied"

      - name: Deployment summary
        run: |
          echo "✅ Deployment completed successfully!"
          echo "Backend URL: ${{ steps.backend-url.outputs.url }}/api"
          FRONTEND_URL=$(az containerapp show \
            --name ${{ needs.terraform-apply.outputs.frontend_app_name }} \
            --resource-group ${{ needs.terraform-apply.outputs.resource_group_name }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "Frontend URL: https://$FRONTEND_URL"
