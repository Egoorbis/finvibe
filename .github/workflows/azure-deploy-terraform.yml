name: Deploy to Azure with Terraform

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  TERRAFORM_VERSION: "1.11"
  WORKING_DIR: ./infra

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      tfplanExitCode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_acr_name: ${{ secrets.ACR_NAME || 'finvibereg' }}
        run: |
          terraform plan -detailed-exitcode -no-color -out=tfplan
          exitcode=$?
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
          if [ $exitcode -eq 1 ]; then
            echo "Terraform plan failed"
            exit 1
          else
            exit 0
          fi

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}/tfplan

  terraform-apply:
    name: Terraform Apply
    needs: [terraform-plan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.terraform-plan.outputs.tfplanExitCode == '2'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      acr_login_server: ${{ steps.outputs.outputs.acr_login_server }}
      backend_app_name: ${{ steps.outputs.outputs.backend_app_name }}
      frontend_app_name: ${{ steps.outputs.outputs.frontend_app_name }}
      resource_group_name: ${{ steps.outputs.outputs.resource_group_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Azure Login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_acr_name: ${{ secrets.ACR_NAME || 'finvibereg' }}
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        id: outputs
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "acr_login_server=$(terraform output -raw container_registry_login_server)" >> $GITHUB_OUTPUT
          echo "backend_app_name=$(terraform output -raw backend_app_name)" >> $GITHUB_OUTPUT
          echo "frontend_app_name=$(terraform output -raw frontend_app_name)" >> $GITHUB_OUTPUT
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> $GITHUB_OUTPUT

  build-and-deploy:
    name: Build and Deploy Containers
    needs: [terraform-plan, terraform-apply]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.terraform-plan.outputs.tfplanExitCode == '2'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: |
          az acr login --name ${{ needs.terraform-apply.outputs.acr_login_server }}

      - name: Build and push backend image
        run: |
          cd backend
          docker build -t ${{ needs.terraform-apply.outputs.acr_login_server }}/finvibe-backend:${{ github.sha }} \
                       -t ${{ needs.terraform-apply.outputs.acr_login_server }}/finvibe-backend:latest .
          docker push ${{ needs.terraform-apply.outputs.acr_login_server }}/finvibe-backend:${{ github.sha }}
          docker push ${{ needs.terraform-apply.outputs.acr_login_server }}/finvibe-backend:latest

      - name: Build and push frontend image
        run: |
          cd frontend
          docker build -t ${{ needs.terraform-apply.outputs.acr_login_server }}/finvibe-frontend:${{ github.sha }} \
                       -t ${{ needs.terraform-apply.outputs.acr_login_server }}/finvibe-frontend:latest .
          docker push ${{ needs.terraform-apply.outputs.acr_login_server }}/finvibe-frontend:${{ github.sha }}
          docker push ${{ needs.terraform-apply.outputs.acr_login_server }}/finvibe-frontend:latest

      - name: Update backend Container App
        run: |
          az containerapp update \
            --name ${{ needs.terraform-apply.outputs.backend_app_name }} \
            --resource-group ${{ needs.terraform-apply.outputs.resource_group_name }} \
            --image ${{ needs.terraform-apply.outputs.acr_login_server }}/finvibe-backend:${{ github.sha }}

      - name: Get backend URL
        id: backend-url
        run: |
          BACKEND_URL=$(az containerapp show \
            --name ${{ needs.terraform-apply.outputs.backend_app_name }} \
            --resource-group ${{ needs.terraform-apply.outputs.resource_group_name }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "url=https://$BACKEND_URL" >> $GITHUB_OUTPUT

      - name: Update frontend Container App
        run: |
          az containerapp update \
            --name ${{ needs.terraform-apply.outputs.frontend_app_name }} \
            --resource-group ${{ needs.terraform-apply.outputs.resource_group_name }} \
            --image ${{ needs.terraform-apply.outputs.acr_login_server }}/finvibe-frontend:${{ github.sha }} \
            --set-env-vars VITE_API_URL=${{ steps.backend-url.outputs.url }}/api

      - name: Run database migrations
        run: |
          az containerapp exec \
            --name ${{ needs.terraform-apply.outputs.backend_app_name }} \
            --resource-group ${{ needs.terraform-apply.outputs.resource_group_name }} \
            --command "/bin/sh" \
            --args "-c 'npm run db:migrate'" || echo "Migration skipped or already applied"

      - name: Deployment summary
        run: |
          echo "✅ Deployment completed successfully!"
          echo "Backend URL: ${{ steps.backend-url.outputs.url }}/api"
          FRONTEND_URL=$(az containerapp show \
            --name ${{ needs.terraform-apply.outputs.frontend_app_name }} \
            --resource-group ${{ needs.terraform-apply.outputs.resource_group_name }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "Frontend URL: https://$FRONTEND_URL"
