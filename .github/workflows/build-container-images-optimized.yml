name: Build and Push Container Images (Optimized)

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/build-container-images-optimized.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# Concurrency control
concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: false

env:
  ACR_NAME: metrreg
  ACR_LOGIN_SERVER: metrreg-g3f3hxgzfbfkfxhk.azurecr.io

jobs:
  # Detect which services changed
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need history for diff

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # Build and push in parallel using matrix
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    # Skip if no changes detected (except on workflow_dispatch)
    if: |
      github.event_name == 'workflow_dispatch' ||
      (matrix.service == 'backend' && needs.detect-changes.outputs.backend == 'true') ||
      (matrix.service == 'frontend' && needs.detect-changes.outputs.frontend == 'true')

    permissions:
      id-token: write
      contents: read

    strategy:
      matrix:
        service: [backend, frontend]
      fail-fast: false  # Continue other builds if one fails

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login using OIDC
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      # Build and push with advanced caching
      - name: Build and push ${{ matrix.service }} image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/finvibe-${{ matrix.service }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/finvibe-${{ matrix.service }}:latest
          cache-from: |
            type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/finvibe-${{ matrix.service }}:buildcache
            type=gha
          cache-to: |
            type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/finvibe-${{ matrix.service }}:buildcache,mode=max
            type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      # Build only (no push) for PRs
      - name: Build ${{ matrix.service }} image (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: finvibe-${{ matrix.service }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Summary
        run: |
          echo "✅ ${{ matrix.service }} build completed successfully!"
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "📦 Pushed: ${{ env.ACR_LOGIN_SERVER }}/finvibe-${{ matrix.service }}:${{ github.sha }}"
            echo "📦 Pushed: ${{ env.ACR_LOGIN_SERVER }}/finvibe-${{ matrix.service }}:latest"
          fi

  # Trigger container app update after successful build
  trigger-update:
    name: Trigger Container App Update
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Azure Login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Backend Container App
        if: needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          echo "🔄 Triggering backend container app revision..."
          az containerapp update \
            --name finvibe-backend \
            --resource-group finvibe-rg \
            --image ${{ env.ACR_LOGIN_SERVER }}/finvibe-backend:${{ github.sha }} \
            --output none || echo "⚠️ Backend update failed or resource not found"

      - name: Update Frontend Container App
        if: needs.detect-changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          echo "🔄 Triggering frontend container app revision..."
          az containerapp update \
            --name finvibe-frontend \
            --resource-group finvibe-rg \
            --image ${{ env.ACR_LOGIN_SERVER }}/finvibe-frontend:${{ github.sha }} \
            --output none || echo "⚠️ Frontend update failed or resource not found"

      - name: Update Complete
        run: |
          echo "✅ Container app updates triggered successfully!"
